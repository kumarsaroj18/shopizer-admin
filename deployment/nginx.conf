# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf – Shopizer Angular Admin UI
#
# Features:
#   • SPA routing fallback  (Angular HTML5 pushState)
#   • gzip compression
#   • Aggressive caching for static assets, no-cache for index.html
#   • Reverse proxy for /api/* → shopizer-backend:8080
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_http_version 1.1;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        application/vnd.ms-fontobject
        application/x-font-ttf;

    # ── Cache: static assets (1 year, immutable) ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Cache: never cache index.html ─────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ── API proxy → Spring Boot backend ───────────────────────────────────────
    # Matches /api/* and forwards to the backend container.
    # In docker-compose the backend is reachable as "shopizer-backend:8080".
    location /api/ {
        proxy_pass            http://shopizer-backend:8080/api/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
    }

    # ── SPA fallback: all non-file requests → index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
