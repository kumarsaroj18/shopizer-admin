# ─────────────────────────────────────────────────────────────────────────────
# nginx-standalone.conf – Shopizer Angular Admin UI (Standalone Mode)
#
# Features:
#   • SPA routing fallback (Angular HTML5 pushState)
#   • gzip compression
#   • Aggressive caching for static assets, no-cache for index.html
#   • NO reverse proxy - Angular app makes direct API calls using APP_BASE_URL
#
# Note: This config is for standalone mode (run-local.sh --mode local/docker).
#       For docker-compose, use deployment/nginx.conf which includes proxy_pass.
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_http_version 1.1;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_vary         on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        application/vnd.ms-fontobject
        application/x-font-ttf;

    # ── Cache: static assets (1 year, immutable) ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Cache: never cache index.html ─────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ── SPA fallback: all non-file requests → index.html ──────────────────────
    # Angular app makes direct API calls to backend using window.env.APP_BASE_URL
    location / {
        try_files $uri $uri/ /index.html;
    }
}
