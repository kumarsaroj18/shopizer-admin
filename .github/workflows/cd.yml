# ─────────────────────────────────────────────────────────────────────────────
# CD Workflow – shopizer-admin (Angular → Nginx Docker image)
#
# Triggered by:
#   1. Successful completion of the "CI" workflow  (workflow_run)
#   2. Manual dispatch with optional CI run ID override
#
# What this does:
#   1.  Guard  – abort if the triggering CI run failed
#   2.  Build  – download CI dist artifact, build Nginx image, export as tar.gz
#
# Resulting artifact:
#   docker-image-admin-<version>-<sha>
#     └─ shopizer-admin-<version>-<sha>.tar.gz   (docker save | gzip)
#
# To load on macOS/Colima:
#   gh run download --repo <org>/shopizer-admin --pattern "docker-image-admin-*"
#   docker load < shopizer-admin-*.tar.gz
# ─────────────────────────────────────────────────────────────────────────────
name: CD – Admin UI

on:
  workflow_run:
    workflows: ["CI"]          # Must match the `name:` in ci.yml exactly
    types: [completed]
    branches: [main, master, develop]

  workflow_dispatch:
    inputs:
      ci_run_id:
        description: 'CI workflow run ID to pull artifact from (leave blank for latest)'
        required: false
        type: string

env:
  IMAGE_NAME: shopizer-admin  # Infra repo that holds the Dockerfile and nginx.conf for all three services
  INFRA_REPO: ${{ github.repository_owner }}/shopizer-infra
# ── Permissions ───────────────────────────────────────────────────────────────
# actions:read   → read artifacts from another workflow run
# contents:read  → checkout code
permissions:
  actions: read
  contents: read

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Guard ────────────────────────────────────────────────────────────────
  guard:
    name: Check CI status
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
      ci_run_id:     ${{ steps.check.outputs.ci_run_id }}
      head_sha:      ${{ steps.check.outputs.head_sha }}

    steps:
      - name: Evaluate trigger
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            if [[ "$CONCLUSION" != "success" ]]; then
              echo "CI concluded with '${CONCLUSION}' – skipping CD."
              echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_deploy=true"                                    >> "$GITHUB_OUTPUT"
              echo "ci_run_id=${{ github.event.workflow_run.id }}"        >> "$GITHUB_OUTPUT"
              echo "head_sha=${{ github.event.workflow_run.head_sha }}"   >> "$GITHUB_OUTPUT"
            fi
          else
            # Manual dispatch
            CI_RUN="${{ github.event.inputs.ci_run_id }}"
            echo "should_deploy=true"         >> "$GITHUB_OUTPUT"
            echo "ci_run_id=${CI_RUN}"        >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Build Docker image ────────────────────────────────────────────────────
  build-image:
    name: Build & Export Docker Image
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should_deploy == 'true'

    outputs:
      image_tag:  ${{ steps.meta.outputs.image_tag }}
      version:    ${{ steps.meta.outputs.version }}
      short_sha:  ${{ steps.meta.outputs.short_sha }}

    steps:
      # ── Checkout shopizer-admin (package.json only; Dockerfile is in shopizer-infra) ──
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the commit that triggered the CI run when possible
          ref: ${{ needs.guard.outputs.head_sha || github.sha }}
          sparse-checkout: |
            package.json
          sparse-checkout-cone-mode: false

      # ── Extract version + compute image tag ──────────────────────────────────
      - name: Compute image metadata
        id: meta
        run: |
          # Fallback to '1.0.0' when package.json has no version field
          RAW_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "")
          VERSION=${RAW_VERSION:-1.0.0}
          if [[ "$VERSION" == "undefined" ]]; then VERSION="1.0.0"; fi

          SHA="${{ needs.guard.outputs.head_sha || github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          IMAGE_TAG="${VERSION}-${SHORT_SHA}"

          echo "version=${VERSION}"       >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}"   >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}"   >> "$GITHUB_OUTPUT"

          echo "Building image: ${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

      # ── Checkout shopizer-infra for Dockerfile + nginx.conf ──────────────────
      # Dockerfiles are maintained in shopizer-infra, not in the source repos.
      - name: Checkout shopizer-infra (Dockerfile + nginx.conf)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          path: shopizer-infra
          sparse-checkout: |
            shopizer/deployment/admin
          sparse-checkout-cone-mode: false

      # ── Resolve CI run ID (workflow_run passes it; manual dispatch may not) ──
      - name: Resolve CI run ID
        id: resolve_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ needs.guard.outputs.ci_run_id }}"
          if [[ -z "$RUN_ID" ]]; then
            echo "No run ID provided – resolving latest successful CI run…"
            RUN_ID=$(gh run list \
              --repo "${{ github.repository }}" \
              --workflow "CI" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            echo "Resolved run ID: ${RUN_ID}"
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

      # ── Download CI dist artifact ─────────────────────────────────────────────
      # CI uploads: name=shopizer-admin-build-<run_number>
      #             path=shopizer-admin-<sha>.tar.gz
      - name: Download dist artifact from CI
        uses: actions/download-artifact@v4
        with:
          run-id:       ${{ steps.resolve_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern:      "shopizer-admin-build-*"
          merge-multiple: true
          path: artifacts/

      # ── Stage dist into Docker build context ──────────────────────────────────
      - name: Extract dist into infra Dockerfile context
        run: |
          echo "Downloaded files:"
          find artifacts/ -type f | sort

          TARBALL=$(find artifacts/ -name "*.tar.gz" | head -1)
          if [[ -z "$TARBALL" ]]; then
            echo "ERROR: No .tar.gz found in downloaded artifacts!"
            ls -R artifacts/
            exit 1
          fi

          # Dockerfile (in shopizer-infra) expects a dist/ directory next to it.
          mkdir -p shopizer-infra/shopizer/deployment/admin/dist
          tar -xzf "$TARBALL" -C shopizer-infra/shopizer/deployment/admin/dist/

          echo "Staged dist files: $(find shopizer-infra/shopizer/deployment/admin/dist -type f | wc -l)"
          ls shopizer-infra/shopizer/deployment/admin/dist/ | head -20

      # ── Docker build ──────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context:   shopizer-infra/shopizer/deployment/admin
          file:      shopizer-infra/shopizer/deployment/admin/Dockerfile
          push:      false
          load:      true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            GIT_SHA=${{ needs.guard.outputs.head_sha || github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

      # ── Smoke-test the image before exporting ─────────────────────────────────
      - name: Smoke-test image
        run: |
          docker run --rm -d \
            --name admin-smoke \
            -p 8081:80 \
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/)
          docker stop admin-smoke
          if [[ "$STATUS" != "200" ]]; then
            echo "Smoke test FAILED (HTTP ${STATUS})"
            exit 1
          fi
          echo "Smoke test PASSED (HTTP ${STATUS})"

      # ── Export loadable tar.gz ────────────────────────────────────────────────
      - name: Export image as tar.gz
        run: |
          mkdir -p image-export
          docker save \
            "${{ env.IMAGE_NAME }}:latest" \
            "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" \
            "${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}" \
          | gzip > "image-export/${{ env.IMAGE_NAME }}-${{ steps.meta.outputs.image_tag }}.tar.gz"

          SIZE=$(du -sh "image-export/${{ env.IMAGE_NAME }}-${{ steps.meta.outputs.image_tag }}.tar.gz" | cut -f1)
          echo "Exported image size: ${SIZE}"

      # ── Upload Docker image artifact ──────────────────────────────────────────
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name:              docker-image-admin-${{ steps.meta.outputs.image_tag }}
          path:              image-export/${{ env.IMAGE_NAME }}-${{ steps.meta.outputs.image_tag }}.tar.gz
          retention-days:    30
          compression-level: 0   # already gzipped

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## CD – Admin UI ✅

          | Field        | Value |
          |:-------------|:------|
          | Image name   | \`${{ env.IMAGE_NAME }}\` |
          | Version      | \`${{ steps.meta.outputs.version }}\` |
          | Git SHA      | \`${{ needs.guard.outputs.head_sha || github.sha }}\` |
          | Image tag    | \`${{ steps.meta.outputs.image_tag }}\` |
          | CI run       | [${{ steps.resolve_run.outputs.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ steps.resolve_run.outputs.run_id }}) |

          ### Load locally (macOS / Colima)
          \`\`\`bash
          # Download image artifact
          gh run download ${{ github.run_id }} \
            --repo ${{ github.repository }} \
            --pattern "docker-image-admin-*" \
            --dir /tmp/shopizer-images

          # Load into local Docker daemon (Colima must be running)
          docker load < /tmp/shopizer-images/${{ env.IMAGE_NAME }}-${{ steps.meta.outputs.image_tag }}.tar.gz

          # Verify
          docker images ${{ env.IMAGE_NAME }}
          \`\`\`
          EOF
